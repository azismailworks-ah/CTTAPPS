<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width,initial-scale=1">

<title>CTT Login</title>

<link
rel="stylesheet"
href="css/style.css">

</head>

<body>

<div class="container">

<div class="login-card">

<div class="logo">
CTT
</div>

<div class="subtitle">
Customer Ticket Tracking
</br>
@AZH Automation
</div>

<div class="input-group">

<label>
Username
</label>

<input
id="username"
type="text">

</div>

<div class="input-group">

<label>
Password
</label>

<input
id="password"
type="password">

</div>

<button
class="btn"
onclick="login()">

LOGIN

</button>

<div
id="loading"
class="loading">

Loading...

</div>

<div
id="error"
class="error">

</div>

</div>

</div>

<script src="js/config.js"></script>
<script src="js/auth.js"></script>

</body>

</html>
